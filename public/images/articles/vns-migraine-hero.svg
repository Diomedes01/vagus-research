<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0F2238"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </radialGradient>
    <radialGradient id="epicentre" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="20%" stop-color="#00B8A9" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#2D7DD2" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="painGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#FF6B6B" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="calmGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00B8A9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00B8A9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="ringFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#2D7DD2" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00B8A9" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Pain zone glow - subtle warm red around epicentre -->
  <ellipse cx="420" cy="280" rx="250" ry="230" fill="url(#painGlow)" opacity="0.5"/>

  <!-- Calm zone glow - teal on the right side (relief spreading) -->
  <ellipse cx="800" cy="350" rx="300" ry="250" fill="url(#calmGlow)" opacity="0.3"/>

  <!-- CONCENTRIC PRESSURE RINGS - emanating from left-of-centre epicentre -->
  <!-- Innermost rings - tight, intense, warm-toned -->
  <g fill="none" stroke-linecap="round">
    <!-- Ring 1 - tight, bright -->
    <ellipse cx="420" cy="280" rx="40" ry="38" stroke="#FF6B6B" stroke-width="2.5" opacity="0.7" filter="url(#glow)"/>
    <!-- Ring 2 -->
    <ellipse cx="420" cy="280" rx="75" ry="70" stroke="#FF6B6B" stroke-width="2" opacity="0.5"/>
    <!-- Ring 3 - transitioning -->
    <ellipse cx="420" cy="280" rx="115" ry="108" stroke="#E05555" stroke-width="1.8" opacity="0.4"/>
    <!-- Ring 4 -->
    <ellipse cx="420" cy="280" rx="160" ry="150" stroke="#C04848" stroke-width="1.5" opacity="0.35" stroke-dasharray="8,4"/>
    <!-- Ring 5 - mid transition to blue -->
    <ellipse cx="420" cy="280" rx="210" ry="195" stroke="#7B4FBF" stroke-width="1.3" opacity="0.3" stroke-dasharray="12,6"/>
    <!-- Ring 6 -->
    <ellipse cx="420" cy="280" rx="265" ry="245" stroke="#4A6FD2" stroke-width="1.2" opacity="0.25" stroke-dasharray="15,8"/>
    <!-- Ring 7 - transitioning to teal -->
    <ellipse cx="420" cy="280" rx="325" ry="300" stroke="#2D7DD2" stroke-width="1" opacity="0.2" stroke-dasharray="18,10"/>
    <!-- Ring 8 - outer, calm teal -->
    <ellipse cx="420" cy="280" rx="390" ry="360" stroke="#00B8A9" stroke-width="0.8" opacity="0.15" stroke-dasharray="20,12"/>
    <!-- Ring 9 - outermost -->
    <ellipse cx="420" cy="280" rx="460" ry="420" stroke="#00B8A9" stroke-width="0.6" opacity="0.1" stroke-dasharray="25,15"/>
  </g>

  <!-- LIGHTNING DISRUPTIONS - jagged electrical paths radiating from epicentre -->
  <g filter="url(#glow)">
    <!-- Lightning bolt 1 - upper right -->
    <polyline points="420,280 445,240 460,255 490,210 505,230 540,180 555,200 580,155"
      stroke="#FF6B6B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <!-- Fading continuation -->
    <polyline points="580,155 600,170 625,135 640,155 670,120"
      stroke="#C04848" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

    <!-- Lightning bolt 2 - right -->
    <polyline points="420,280 460,275 470,295 510,270 525,290 570,260 585,278 630,250"
      stroke="#FF6B6B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <!-- Fading -->
    <polyline points="630,250 660,265 690,240 720,258 760,235"
      stroke="#7B4FBF" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
    <!-- Further fading to teal -->
    <polyline points="760,235 790,248 820,230 850,245"
      stroke="#2D7DD2" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.2"/>

    <!-- Lightning bolt 3 - lower right -->
    <polyline points="420,280 450,310 440,330 480,350 470,370 520,395 510,410 560,440"
      stroke="#FF6B6B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
    <polyline points="560,440 590,425 620,450 660,430 700,455"
      stroke="#7B4FBF" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

    <!-- Lightning bolt 4 - upward -->
    <polyline points="420,280 410,245 430,225 415,190 435,170 420,135 440,110"
      stroke="#E05555" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

    <!-- Lightning bolt 5 - left (shorter, already dissipating) -->
    <polyline points="420,280 390,265 400,245 375,230 385,210"
      stroke="#E05555" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

    <!-- Lightning bolt 6 - lower left -->
    <polyline points="420,280 395,310 410,335 385,360 400,385"
      stroke="#C04848" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
  </g>

  <!-- SMOOTH WAVE LINES on the right side - representing relief/calm -->
  <g filter="url(#softGlow)" fill="none" stroke-linecap="round" opacity="0.4">
    <path d="M 750,180 Q 800,195 850,180 Q 900,165 950,180 Q 1000,195 1050,180"
      stroke="#00B8A9" stroke-width="1.5"/>
    <path d="M 730,230 Q 790,250 850,230 Q 910,210 970,230 Q 1030,250 1090,230"
      stroke="#00B8A9" stroke-width="1.3"/>
    <path d="M 720,280 Q 785,300 850,280 Q 915,260 980,280 Q 1045,300 1110,280"
      stroke="#00B8A9" stroke-width="1.2"/>
    <path d="M 730,330 Q 790,348 850,330 Q 910,312 970,330 Q 1030,348 1090,330"
      stroke="#00B8A9" stroke-width="1.1"/>
    <path d="M 750,380 Q 805,395 860,380 Q 915,365 970,380 Q 1025,395 1080,380"
      stroke="#00B8A9" stroke-width="1"/>
    <path d="M 770,430 Q 820,442 870,430 Q 920,418 970,430 Q 1020,442 1070,430"
      stroke="#00B8A9" stroke-width="0.8"/>
  </g>

  <!-- EPICENTRE - bright hot point -->
  <g filter="url(#bigGlow)">
    <circle cx="420" cy="280" r="15" fill="#FFFFFF" opacity="0.15"/>
  </g>
  <g filter="url(#softGlow)">
    <circle cx="420" cy="280" r="8" fill="#FFFFFF" opacity="0.3"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="420" cy="280" r="4" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="420" cy="280" r="2" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- Small sparks/particles near lightning paths -->
  <g opacity="0.6">
    <circle cx="490" cy="210" r="1.5" fill="#FF6B6B" filter="url(#glow)"/>
    <circle cx="540" cy="182" r="1" fill="#FF6B6B" filter="url(#glow)"/>
    <circle cx="510" cy="272" r="1.2" fill="#E05555" filter="url(#glow)"/>
    <circle cx="520" cy="395" r="1" fill="#E05555" filter="url(#glow)"/>
    <circle cx="460" cy="215" r="1" fill="#FF6B6B" filter="url(#glow)"/>
    <circle cx="475" cy="350" r="1.2" fill="#E05555" filter="url(#glow)"/>
  </g>

  <!-- Calm particles on right side -->
  <g opacity="0.4">
    <circle cx="800" cy="200" r="1.5" fill="#00B8A9"/>
    <circle cx="880" cy="250" r="1" fill="#00B8A9"/>
    <circle cx="950" cy="300" r="1.2" fill="#00B8A9"/>
    <circle cx="820" cy="370" r="1" fill="#00B8A9"/>
    <circle cx="900" cy="420" r="1.5" fill="#00B8A9"/>
    <circle cx="1000" cy="350" r="1" fill="#2D7DD2"/>
    <circle cx="1060" cy="280" r="1" fill="#2D7DD2"/>
  </g>

  <!-- Transition zone - where lightning meets calm (middle area) -->
  <g opacity="0.25" filter="url(#softGlow)">
    <!-- Fading disrupted lines becoming smooth -->
    <path d="M 680,200 Q 700,205 720,198" stroke="#4A6FD2" stroke-width="1" fill="none"/>
    <path d="M 670,310 Q 695,315 720,308" stroke="#4A6FD2" stroke-width="1" fill="none"/>
    <path d="M 690,400 Q 710,404 730,398" stroke="#4A6FD2" stroke-width="0.8" fill="none"/>
  </g>
</svg>