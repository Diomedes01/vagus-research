<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Neural network pattern -->
  <g stroke="url(#wave)" stroke-width="1.5" fill="none">
    <circle cx="200" cy="200" r="80" opacity="0.15"/>
    <circle cx="200" cy="200" r="40" opacity="0.1"/>
    <circle cx="450" cy="350" r="60" opacity="0.12"/>
    <circle cx="750" cy="180" r="90" opacity="0.1"/>
    <circle cx="950" cy="400" r="70" opacity="0.15"/>
    <circle cx="600" cy="500" r="50" opacity="0.08"/>
    <line x1="200" y1="200" x2="450" y2="350" opacity="0.1"/>
    <line x1="450" y1="350" x2="750" y2="180" opacity="0.08"/>
    <line x1="750" y1="180" x2="950" y2="400" opacity="0.1"/>
    <line x1="450" y1="350" x2="600" y2="500" opacity="0.08"/>
    <line x1="200" y1="200" x2="750" y2="180" opacity="0.06"/>
  </g>
  <!-- Neuron cells -->
  <g fill="#ffffff" opacity="0.15">
    <circle cx="200" cy="200" r="6"/>
    <circle cx="450" cy="350" r="5"/>
    <circle cx="750" cy="180" r="7"/>
    <circle cx="950" cy="400" r="5"/>
    <circle cx="600" cy="500" r="4"/>
    <circle cx="350" cy="120" r="3"/>
    <circle cx="850" cy="280" r="3"/>
    <circle cx="500" cy="150" r="3"/>
    <circle cx="700" cy="450" r="4"/>
    <circle cx="150" cy="400" r="3"/>
    <circle cx="1050" cy="200" r="3"/>
  </g>
  <!-- Vagus nerve path -->
  <path d="M580 80 C560 180, 520 280, 540 380 C560 480, 620 530, 600 600" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.2" stroke-dasharray="8,4"/>
  <path d="M620 80 C640 180, 680 280, 660 380 C640 480, 580 530, 600 600" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.2" stroke-dasharray="8,4"/>
</svg>
