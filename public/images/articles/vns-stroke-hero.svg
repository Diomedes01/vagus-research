<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#0F2238"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </radialGradient>
    <radialGradient id="restoreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00B8A9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00B8A9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trunkGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1A3A5C"/>
      <stop offset="60%" stop-color="#2D7DD2" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00B8A9" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="branchDim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A3050" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1A3050" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="branchLit" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00B8A9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2D7DD2" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="branchRestoring" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00B8A9" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#2D7DD2" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#1A3050" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1A3050" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle ambient glow where restoration is happening -->
  <ellipse cx="600" cy="300" rx="350" ry="280" fill="url(#restoreGlow)" opacity="0.2"/>

  <!-- MAIN VASCULAR TRUNK - rising from bottom centre -->
  <g filter="url(#softGlow)">
    <!-- Main trunk -->
    <path d="M 350,630 Q 360,580 370,520 Q 380,460 400,400 Q 420,340 440,300 Q 460,260 470,240"
      stroke="#2D7DD2" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.8"/>
    <!-- Inner glow line on trunk -->
    <path d="M 350,630 Q 360,580 370,520 Q 380,460 400,400 Q 420,340 440,300 Q 460,260 470,240"
      stroke="#00B8A9" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- MAIN BIFURCATION POINT -->
  <circle cx="470" cy="240" r="6" fill="#2D7DD2" opacity="0.6" filter="url(#glow)"/>
  <circle cx="470" cy="240" r="3" fill="#00B8A9" opacity="0.8" filter="url(#glow)"/>

  <!-- LEFT BRANCH SYSTEM (healthy, fully lit) -->
  <g filter="url(#glow)">
    <!-- Primary left branch -->
    <path d="M 470,240 Q 420,200 370,170 Q 320,140 270,120"
      stroke="#00B8A9" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 470,240 Q 420,200 370,170 Q 320,140 270,120"
      stroke="#00B8A9" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>

    <!-- Sub-branches from left primary -->
    <path d="M 370,170 Q 340,145 310,130 Q 280,115 240,105"
      stroke="#00B8A9" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M 370,170 Q 350,190 320,200 Q 290,210 250,215"
      stroke="#00B8A9" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.45"/>
    <path d="M 420,200 Q 400,220 370,240 Q 340,255 300,265"
      stroke="#00B8A9" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>

    <!-- Tiny capillary branches -->
    <path d="M 310,130 Q 290,120 265,115" stroke="#00B8A9" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.35"/>
    <path d="M 310,130 Q 300,145 285,155" stroke="#00B8A9" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.3"/>
    <path d="M 270,120 Q 250,110 225,108" stroke="#00B8A9" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.3"/>
    <path d="M 270,120 Q 260,135 245,145" stroke="#00B8A9" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.25"/>
    <path d="M 250,215 Q 230,220 210,218" stroke="#00B8A9" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.25"/>
    <path d="M 250,215 Q 240,230 225,240" stroke="#00B8A9" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.25"/>
    <path d="M 300,265 Q 280,270 260,268" stroke="#00B8A9" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.2"/>
    <path d="M 240,105 Q 220,100 200,102" stroke="#00B8A9" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- LEFT LOWER BRANCH (healthy) -->
  <g filter="url(#glow)">
    <path d="M 440,300 Q 400,320 355,340 Q 310,360 260,370"
      stroke="#00B8A9" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.55"/>
    <path d="M 355,340 Q 330,355 300,365 Q 270,375 235,378"
      stroke="#00B8A9" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
    <path d="M 355,340 Q 340,365 320,385 Q 300,400 275,410"
      stroke="#00B8A9" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
    <path d="M 400,320 Q 380,345 360,370 Q 340,395 315,415"
      stroke="#00B8A9" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.35"/>
    <!-- Tiny capillaries -->
    <path d="M 260,370 Q 240,372 222,368" stroke="#00B8A9" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.2"/>
    <path d="M 275,410 Q 260,415 245,412" stroke="#00B8A9" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- RIGHT BRANCH SYSTEM - THIS IS THE RESTORATION ZONE -->
  <!-- Primary right branch - transitions from lit to dim (being restored) -->
  <g>
    <!-- Base of right branch (lit) -->
    <path d="M 470,240 Q 530,200 590,180 Q 650,160 710,150"
      stroke="#2D7DD2" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7" filter="url(#glow)"/>
    <path d="M 470,240 Q 530,200 590,180 Q 650,160 710,150"
      stroke="#00B8A9" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35" filter="url(#glow)"/>

    <!-- BLOCKAGE/RESTORATION POINT - bright pulse -->
    <circle cx="710" cy="150" r="10" fill="#00B8A9" opacity="0.15" filter="url(#bigGlow)"/>
    <circle cx="710" cy="150" r="5" fill="#00B8A9" opacity="0.4" filter="url(#softGlow)"/>
    <circle cx="710" cy="150" r="2.5" fill="#FFFFFF" opacity="0.6" filter="url(#glow)"/>

    <!-- Beyond blockage - branches being restored (transitional glow) -->
    <path d="M 710,150 Q 760,140 810,125 Q 860,110 910,100"
      stroke="#00B8A9" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.5" filter="url(#glow)"/>
    <path d="M 710,150 Q 750,165 790,170 Q 840,175 890,172"
      stroke="#00B8A9" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.35" filter="url(#glow)"/>

    <!-- Newly restored capillaries (dimmer, awakening) -->
    <path d="M 810,125 Q 840,115 870,112" stroke="#2D7DD2" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>
    <path d="M 810,125 Q 830,135 855,140" stroke="#2D7DD2" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.25"/>
    <path d="M 910,100 Q 940,95 965,98" stroke="#2D7DD2" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.2"/>
    <path d="M 910,100 Q 930,110 955,115" stroke="#2D7DD2" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.2"/>
    <path d="M 890,172 Q 920,170 945,175" stroke="#2D7DD2" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.2"/>

    <!-- Still-dim branches beyond restoration front -->
    <path d="M 870,112 Q 900,105 930,108" stroke="#1A3050" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.3"/>
    <path d="M 965,98 Q 990,100 1010,95" stroke="#1A3050" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.2"/>
    <path d="M 955,115 Q 980,120 1000,118" stroke="#1A3050" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- RIGHT LOWER BRANCH (restoration zone) -->
  <g>
    <path d="M 470,240 Q 520,270 575,290 Q 630,310 680,320"
      stroke="#2D7DD2" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.6" filter="url(#glow)"/>

    <!-- Second restoration point -->
    <circle cx="680" cy="320" r="7" fill="#00B8A9" opacity="0.12" filter="url(#bigGlow)"/>
    <circle cx="680" cy="320" r="3.5" fill="#00B8A9" opacity="0.35" filter="url(#softGlow)"/>

    <!-- Restoring branches -->
    <path d="M 680,320 Q 730,335 780,340 Q 830,345 880,340"
      stroke="#00B8A9" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.35" filter="url(#glow)"/>
    <path d="M 680,320 Q 720,350 760,375 Q 800,395 845,405"
      stroke="#00B8A9" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.3" filter="url(#glow)"/>
    <path d="M 680,320 Q 710,300 745,290 Q 780,282 815,280"
      stroke="#2D7DD2" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>

    <!-- Faint capillaries -->
    <path d="M 880,340 Q 910,338 935,342" stroke="#2D7DD2" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.2"/>
    <path d="M 845,405 Q 870,408 895,402" stroke="#2D7DD2" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.2"/>
    <path d="M 815,280 Q 840,278 860,282" stroke="#1A3050" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- LOWER TRUNK BRANCHES -->
  <g filter="url(#glow)">
    <path d="M 380,460 Q 390,440 410,420 Q 430,400 440,380"
      stroke="#2D7DD2" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M 390,440 Q 360,430 330,425 Q 300,420 265,422"
      stroke="#00B8A9" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
    <path d="M 410,420 Q 440,435 470,445 Q 500,455 535,458"
      stroke="#2D7DD2" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- FLOW PARTICLES - moving along the restored pathways -->
  <g opacity="0.7">
    <!-- Along main right branch -->
    <circle cx="540" cy="195" r="2.5" fill="#00B8A9" filter="url(#glow)"/>
    <circle cx="590" cy="178" r="2" fill="#00B8A9" filter="url(#glow)"/>
    <circle cx="650" cy="158" r="2" fill="#00B8A9" filter="url(#glow)"/>
    <!-- Past restoration point -->
    <circle cx="740" cy="142" r="2" fill="#00B8A9" opacity="0.6" filter="url(#glow)"/>
    <circle cx="800" cy="128" r="1.5" fill="#00B8A9" opacity="0.5" filter="url(#glow)"/>
    <circle cx="860" cy="112" r="1.5" fill="#00B8A9" opacity="0.4" filter="url(#glow)"/>

    <!-- Along right lower branch -->
    <circle cx="575" cy="290" r="2" fill="#00B8A9" filter="url(#glow)"/>
    <circle cx="630" cy="310" r="2" fill="#00B8A9" filter="url(#glow)"/>
    <circle cx="730" cy="338" r="1.5" fill="#00B8A9" opacity="0.5" filter="url(#glow)"/>

    <!-- Along left healthy branches -->
    <circle cx="395" cy="183" r="2" fill="#00B8A9" opacity="0.5"/>
    <circle cx="340" cy="155" r="1.5" fill="#00B8A9" opacity="0.4"/>
    <circle cx="375" cy="340" r="1.5" fill="#00B8A9" opacity="0.4"/>
  </g>

  <!-- Subtle background particles -->
  <g opacity="0.3">
    <circle cx="100" cy="100" r="1" fill="#2D7DD2"/>
    <circle cx="200" cy="500" r="1.2" fill="#00B8A9"/>
    <circle cx="1050" cy="200" r="1" fill="#2D7DD2"/>
    <circle cx="1100" cy="400" r="1.2" fill="#00B8A9"/>
    <circle cx="150" cy="350" r="1" fill="#2D7DD2"/>
    <circle cx="1000" cy="550" r="1" fill="#2D7DD2"/>
    <circle cx="500" cy="560" r="1" fill="#00B8A9"/>
    <circle cx="700" cy="500" r="1" fill="#2D7DD2"/>
  </g>
</svg>