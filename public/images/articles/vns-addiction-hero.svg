<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Brain outline -->
  <g transform="translate(600,300)" stroke="#ffffff" stroke-width="1.2" fill="none" opacity="0.12">
    <path d="M0 120 L0 0"/>
    <path d="M0 0 C0 -60, -40 -100, -80 -100 C-120 -100, -150 -70, -150 -30 C-150 0, -130 20, -110 30 C-140 40, -160 70, -160 100 C-160 140, -130 170, -90 170 L0 170"/>
    <path d="M0 0 C0 -60, 40 -100, 80 -100 C120 -100, 150 -70, 150 -30 C150 0, 130 20, 110 30 C140 40, 160 70, 160 100 C160 140, 130 170, 90 170 L0 170"/>
  </g>
  <!-- Reward circuit nodes -->
  <g fill="#ffffff" opacity="0.2">
    <circle cx="600" cy="260" r="12"/>
    <circle cx="540" cy="320" r="8"/>
    <circle cx="660" cy="320" r="8"/>
    <circle cx="600" cy="380" r="10"/>
    <circle cx="520" cy="260" r="6"/>
    <circle cx="680" cy="260" r="6"/>
  </g>
  <g stroke="#ffffff" stroke-width="1" fill="none" opacity="0.1">
    <line x1="600" y1="260" x2="540" y2="320"/>
    <line x1="600" y1="260" x2="660" y2="320"/>
    <line x1="540" y1="320" x2="600" y2="380"/>
    <line x1="660" y1="320" x2="600" y2="380"/>
    <line x1="520" y1="260" x2="600" y2="260"/>
    <line x1="680" y1="260" x2="600" y2="260"/>
  </g>
  <!-- Signal waves (representing neural signals) -->
  <g stroke="#ffffff" stroke-width="1" fill="none" opacity="0.08">
    <path d="M100 200 Q200 180, 300 200 Q400 220, 500 200"/>
    <path d="M700 200 Q800 180, 900 200 Q1000 220, 1100 200"/>
    <path d="M100 430 Q200 410, 300 430 Q400 450, 500 430"/>
    <path d="M700 430 Q800 410, 900 430 Q1000 450, 1100 430"/>
  </g>
  <!-- Scattered nodes -->
  <g fill="#ffffff" opacity="0.1">
    <circle cx="180" cy="150" r="3"/>
    <circle cx="320" cy="480" r="3"/>
    <circle cx="850" cy="130" r="4"/>
    <circle cx="1000" cy="500" r="3"/>
    <circle cx="150" cy="380" r="3"/>
    <circle cx="1050" cy="280" r="3"/>
  </g>
</svg>
