<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0F2238"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00B8A9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00B8A9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2D7DD2" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2D7DD2" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="fragmentShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#00B8A9" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="threadGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00B8A9" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#00B8A9" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2D7DD2" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="threadGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D7DD2" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#00B8A9" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00B8A9" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="fragGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3A5C"/>
      <stop offset="100%" stop-color="#0F2238"/>
    </linearGradient>
    <linearGradient id="fragGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E4060"/>
      <stop offset="100%" stop-color="#122A44"/>
    </linearGradient>
    <linearGradient id="fragGrad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#163350"/>
      <stop offset="100%" stop-color="#0D1E30"/>
    </linearGradient>
    <linearGradient id="edgeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B8A9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2D7DD2" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle background ambient glow -->
  <ellipse cx="600" cy="315" rx="400" ry="280" fill="url(#glowBlue)" opacity="0.3"/>
  <ellipse cx="550" cy="300" rx="200" ry="180" fill="url(#glowTeal)" opacity="0.15"/>

  <!-- Scattered small particles/dust -->
  <g opacity="0.4">
    <circle cx="150" cy="120" r="1.5" fill="#00B8A9"/>
    <circle cx="280" cy="80" r="1" fill="#2D7DD2"/>
    <circle cx="420" cy="150" r="1.2" fill="#00B8A9"/>
    <circle cx="780" cy="100" r="1" fill="#2D7DD2"/>
    <circle cx="920" cy="180" r="1.5" fill="#00B8A9"/>
    <circle cx="1050" cy="130" r="1" fill="#2D7DD2"/>
    <circle cx="100" cy="400" r="1.2" fill="#00B8A9"/>
    <circle cx="200" cy="520" r="1" fill="#2D7DD2"/>
    <circle cx="1000" cy="450" r="1.5" fill="#00B8A9"/>
    <circle cx="1100" cy="380" r="1" fill="#2D7DD2"/>
    <circle cx="350" cy="550" r="1.2" fill="#00B8A9"/>
    <circle cx="850" cy="530" r="1" fill="#2D7DD2"/>
  </g>

  <!-- FRAGMENT GROUP - Shattered geometric shapes floating in space -->

  <!-- Large central fragment cluster (mostly reassembled) -->
  <!-- Fragment 1 - large pentagon shape, slightly tilted -->
  <g filter="url(#fragmentShadow)" transform="translate(480, 220) rotate(-5)">
    <polygon points="0,0 80,-10 120,50 90,110 10,100" fill="url(#fragGrad1)" stroke="url(#edgeGlow)" stroke-width="1.5" opacity="0.9"/>
    <polygon points="0,0 80,-10 120,50 90,110 10,100" fill="none" stroke="#00B8A9" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Fragment 2 - adjacent, fitting like a puzzle piece -->
  <g filter="url(#fragmentShadow)" transform="translate(590, 205) rotate(2)">
    <polygon points="0,5 70,-15 110,30 100,100 30,105 -5,60" fill="url(#fragGrad2)" stroke="url(#edgeGlow)" stroke-width="1.5" opacity="0.9"/>
  </g>

  <!-- Fragment 3 - below, connecting -->
  <g filter="url(#fragmentShadow)" transform="translate(500, 320) rotate(-2)">
    <polygon points="5,0 90,-5 110,55 80,100 0,85" fill="url(#fragGrad3)" stroke="url(#edgeGlow)" stroke-width="1.5" opacity="0.85"/>
  </g>

  <!-- Fragment 4 - right side, partially connected -->
  <g filter="url(#fragmentShadow)" transform="translate(610, 305) rotate(4)">
    <polygon points="0,-5 75,0 95,60 70,95 -10,80" fill="url(#fragGrad1)" stroke="url(#edgeGlow)" stroke-width="1.5" opacity="0.85"/>
  </g>

  <!-- Drifting fragment - upper left (not yet reconnected) -->
  <g filter="url(#fragmentShadow)" transform="translate(310, 150) rotate(-18)">
    <polygon points="0,0 65,-8 80,45 50,75 -10,55" fill="url(#fragGrad2)" stroke="#2D7DD2" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- Drifting fragment - upper right -->
  <g filter="url(#fragmentShadow)" transform="translate(780, 130) rotate(15)">
    <polygon points="5,0 55,-5 70,35 45,65 0,50" fill="url(#fragGrad3)" stroke="#2D7DD2" stroke-width="1" opacity="0.65"/>
  </g>

  <!-- Drifting fragment - lower left -->
  <g filter="url(#fragmentShadow)" transform="translate(260, 380) rotate(-25)">
    <polygon points="0,5 50,0 70,40 55,70 5,60" fill="url(#fragGrad1)" stroke="#2D7DD2" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Drifting fragment - far right -->
  <g filter="url(#fragmentShadow)" transform="translate(850, 320) rotate(20)">
    <polygon points="0,0 60,5 55,55 10,60" fill="url(#fragGrad2)" stroke="#2D7DD2" stroke-width="1" opacity="0.55"/>
  </g>

  <!-- Drifting fragment - bottom -->
  <g filter="url(#fragmentShadow)" transform="translate(550, 460) rotate(10)">
    <polygon points="5,0 55,-5 65,35 40,55 0,40" fill="url(#fragGrad3)" stroke="#2D7DD2" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Small drifting shard - top -->
  <g filter="url(#fragmentShadow)" transform="translate(650, 90) rotate(30)">
    <polygon points="0,0 35,5 25,35 -5,25" fill="url(#fragGrad1)" stroke="#2D7DD2" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Small shard - far left -->
  <g filter="url(#fragmentShadow)" transform="translate(150, 260) rotate(-35)">
    <polygon points="0,0 30,-5 35,25 5,30" fill="url(#fragGrad2)" stroke="#2D7DD2" stroke-width="0.8" opacity="0.45"/>
  </g>

  <!-- Small shard - bottom right -->
  <g filter="url(#fragmentShadow)" transform="translate(900, 450) rotate(25)">
    <polygon points="0,0 25,5 20,30 -5,22" fill="url(#fragGrad3)" stroke="#2D7DD2" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- HEALING THREADS - Teal light connections between fragments -->
  <g filter="url(#glow)">
    <!-- Thread from upper-left drifting fragment to central cluster -->
    <path d="M 365,190 Q 400,200 430,210 Q 460,218 480,222" stroke="url(#threadGrad1)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="365" cy="190" r="3" fill="#00B8A9" opacity="0.8"/>
    <circle cx="480" cy="222" r="3" fill="#00B8A9" opacity="0.8"/>

    <!-- Thread from upper-right fragment to central -->
    <path d="M 790,165 Q 740,180 700,200 Q 680,208 665,215" stroke="url(#threadGrad2)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="790" cy="165" r="2.5" fill="#00B8A9" opacity="0.7"/>
    <circle cx="665" cy="215" r="2.5" fill="#00B8A9" opacity="0.7"/>

    <!-- Thread from lower-left fragment toward central -->
    <path d="M 305,420 Q 370,400 430,370 Q 470,350 495,335" stroke="url(#threadGrad1)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="4,6"/>
    <circle cx="305" cy="420" r="2.5" fill="#00B8A9" opacity="0.6"/>

    <!-- Thread from far-right fragment toward central -->
    <path d="M 850,340 Q 800,335 750,325 Q 720,318 700,312" stroke="url(#threadGrad2)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="5,7"/>
    <circle cx="850" cy="340" r="2" fill="#00B8A9" opacity="0.5"/>

    <!-- Thread from bottom fragment upward -->
    <path d="M 570,460 Q 575,430 580,410 Q 590,390 600,375" stroke="url(#threadGrad1)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="570" cy="460" r="2.5" fill="#00B8A9" opacity="0.7"/>
    <circle cx="600" cy="375" r="2.5" fill="#00B8A9" opacity="0.7"/>

    <!-- Cross-threads between central fragments (already connected) -->
    <line x1="560" y1="270" x2="600" y2="260" stroke="#00B8A9" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="570" y1="315" x2="610" y2="310" stroke="#00B8A9" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="555" y1="290" x2="595" y2="285" stroke="#00B8A9" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Thread between distant fragments (very faint - not yet connected) -->
  <g filter="url(#softGlow)" opacity="0.3">
    <path d="M 165,275 Q 200,270 250,260" stroke="#2D7DD2" stroke-width="1" fill="none" stroke-dasharray="3,8" stroke-linecap="round"/>
    <path d="M 910,455 Q 870,445 830,430" stroke="#2D7DD2" stroke-width="1" fill="none" stroke-dasharray="3,8" stroke-linecap="round"/>
    <path d="M 660,95 Q 660,120 660,140" stroke="#2D7DD2" stroke-width="1" fill="none" stroke-dasharray="3,8" stroke-linecap="round"/>
  </g>

  <!-- Central glow node - the "heart" of reassembly -->
  <g filter="url(#softGlow)">
    <circle cx="580" cy="285" r="25" fill="#00B8A9" opacity="0.08"/>
    <circle cx="580" cy="285" r="12" fill="#00B8A9" opacity="0.12"/>
    <circle cx="580" cy="285" r="4" fill="#00B8A9" opacity="0.5"/>
  </g>

  <!-- Tiny energy particles along threads -->
  <g opacity="0.7">
    <circle cx="420" cy="212" r="1.5" fill="#00B8A9" filter="url(#glow)"/>
    <circle cx="450" cy="217" r="1" fill="#00B8A9" filter="url(#glow)"/>
    <circle cx="730" cy="185" r="1.5" fill="#00B8A9" filter="url(#glow)"/>
    <circle cx="700" cy="195" r="1" fill="#00B8A9" filter="url(#glow)"/>
    <circle cx="575" cy="440" r="1.5" fill="#00B8A9" filter="url(#glow)"/>
    <circle cx="585" cy="400" r="1" fill="#00B8A9" filter="url(#glow)"/>
    <circle cx="370" cy="400" r="1" fill="#00B8A9" filter="url(#glow)"/>
    <circle cx="770" cy="330" r="1" fill="#00B8A9" filter="url(#glow)"/>
  </g>

  <!-- Very subtle crack lines on central fragments showing where they were broken -->
  <g opacity="0.2" stroke="#00B8A9" stroke-width="0.5" fill="none">
    <path d="M 530,250 L 550,280 L 540,310"/>
    <path d="M 610,240 L 620,270 L 615,295"/>
    <path d="M 560,330 L 575,350 L 570,370"/>
  </g>
</svg>